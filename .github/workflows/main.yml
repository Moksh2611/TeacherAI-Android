name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract project ZIP
      run: unzip -q TeacherAI-Final.zip -d project

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix build.gradle namespace
      working-directory: project
      run: |
        sed -i "s/android {/android {\n    namespace 'com.teacherai.app'/" app/build.gradle
        cat app/build.gradle

    - name: Setup Gradle Wrapper
      working-directory: project
      run: |
        mkdir -p gradle/wrapper
        curl -fsSL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
             -o gradle/wrapper/gradle-wrapper.jar
        curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew" \
             -o gradlew
        chmod +x gradlew

    - name: Create local.properties
      working-directory: project
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Build APK
      working-directory: project
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TeacherAI-debug-apk
        path: project/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

