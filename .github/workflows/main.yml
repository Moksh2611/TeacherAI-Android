
name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract project ZIP
      run: |
        unzip -o TeacherAI-Final.zip
        echo "=== Root files ==="
        ls -la
        echo "=== All folders ==="
        find . -maxdepth 3 -type d | head -30
        SUBDIR=$(find . -maxdepth 1 -type d -name "TeacherAI*" | head -1)
        if [ -n "$SUBDIR" ]; then
          echo "Moving from $SUBDIR"
          cp -rn "$SUBDIR"/. .
          rm -rf "$SUBDIR"
        fi
        echo "=== After move ==="
        ls -la

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix build.gradle namespace
      run: |
        cat app/build.gradle
        sed -i "s/android {/android {\n    namespace 'com.teacherai.app'/" app/build.gradle

    - name: Setup Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        PROPS
        curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
             -o gradle/wrapper/gradle-wrapper.jar
        curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew" -o gradlew
        chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TeacherAI-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
